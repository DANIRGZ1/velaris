name: Release

# Se dispara cuando subes un tag tipo v0.1.0, v1.0.0, etc.
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write   # necesario para crear el GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: pnpm install

      - name: Build & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Velaris ${{ github.ref_name }}'
          releaseBody: |
            ## Velaris ${{ github.ref_name }}

            ### Instalación
            Descarga `Velaris_*_x64-setup.exe` y ejecútalo.

            ### Novedades
            _Consulta los commits para ver los cambios de esta versión._
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
